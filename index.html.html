<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>席替えアプリ</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --warning: #f59e0b;
      --success: #16a34a;
      --unused: #4b5563;
      --fixed: #fde68a;
      --front: #dbeafe;
      --empty: #f9fafb;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      background: #1f2937;
      color: #fff;
      padding: 18px 24px;
      box-shadow: var(--shadow);
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.04em;
    }

    header p {
      margin: 4px 0 0;
      color: #d1d5db;
      font-size: 14px;
    }

    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
    }

    .left-column, .right-column {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
      border-left: 5px solid var(--primary);
      padding-left: 10px;
    }

    h3 {
      margin: 16px 0 8px;
      font-size: 15px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    input[type="text"], select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      font-family: inherit;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: 0.15s;
      white-space: nowrap;
    }

    button:hover { background: var(--primary-dark); }
    button.secondary { background: #6b7280; }
    button.secondary:hover { background: #4b5563; }
    button.danger { background: var(--danger); }
    button.danger:hover { background: #b91c1c; }
    button.success { background: var(--success); }
    button.success:hover { background: #15803d; }
    button.warning { background: var(--warning); color: #111827; }
    button.warning:hover { background: #d97706; }
    button.small { padding: 6px 8px; font-size: 12px; }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .row > * { min-width: 0; }
    .row .grow { flex: 1; }

    .help {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .message {
      display: none;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .message.show { display: block; }
    .message.info { background: #dbeafe; border: 1px solid #93c5fd; }
    .message.error { background: #fee2e2; border: 1px solid #fca5a5; color: #7f1d1d; }
    .message.success { background: #dcfce7; border: 1px solid #86efac; color: #14532d; }
    .message.warning { background: #fef3c7; border: 1px solid #fcd34d; color: #78350f; }

    .student-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      max-height: 360px;
      overflow: auto;
      padding-right: 4px;
    }

    .student-item {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 6px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fafafa;
    }

    .student-name {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .check-label {
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 0;
      color: var(--text);
      font-size: 12px;
      white-space: nowrap;
    }

    .blackboard {
      max-width: 760px;
      margin: 0 auto 14px;
      background: #14532d;
      color: #fff;
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      font-weight: 700;
      letter-spacing: 0.2em;
      border: 5px solid #7c4a20;
    }

    .seat-wrapper {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .seat-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(92px, 1fr));
      gap: 10px;
      min-width: 800px;
      max-width: 1040px;
      margin: 0 auto;
    }

    .seat {
      min-height: 82px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 7px;
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      transition: 0.15s;
      user-select: none;
    }

    .seat:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(15, 23, 42, 0.1);
    }

    .seat.front-area { background: linear-gradient(180deg, var(--front), #fff); }
    .seat.unused { background: var(--unused); color: #fff; border-color: #374151; }
    .seat.fixed { background: var(--fixed); border-color: #f59e0b; }
    .seat.empty { background: var(--empty); color: var(--muted); }
    .seat.selected { outline: 4px solid #60a5fa; }
    .seat.conflict { outline: 4px solid #ef4444; }

    .seat .seat-number {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .seat.unused .seat-number { color: #e5e7eb; }

    .seat .badge {
      position: absolute;
      bottom: 4px;
      right: 6px;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #111827;
    }

    .seat-name {
      font-size: 15px;
      font-weight: 700;
      overflow-wrap: anywhere;
      padding: 0 4px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      margin: 12px 0;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      justify-content: center;
    }

    .legend span {
      display: inline-flex;
      gap: 5px;
      align-items: center;
    }

    .legend i {
      width: 15px;
      height: 15px;
      display: inline-block;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .history-list, .pair-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow: auto;
    }

    .simple-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fafafa;
      font-size: 13px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .copy-text {
      width: 100%;
      min-height: 170px;
      font-family: "Consolas", "Menlo", monospace;
      white-space: pre;
    }

    details {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fafafa;
    }

    summary {
      cursor: pointer;
      font-weight: 700;
    }

    .stat-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .stat-line span {
      background: #f3f4f6;
      padding: 4px 8px;
      border-radius: 999px;
    }


    .teacher-panel-trigger {
      position: fixed;
      right: 0;
      bottom: 0;
      width: 18px;
      height: 18px;
      border-radius: 0;
      opacity: 0;
      background: transparent;
      color: transparent;
      font-size: 0;
      padding: 0;
      z-index: 20;
    }

    .teacher-panel-trigger:hover { opacity: 0.15; background: #111827; }

    .hidden-admin {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(15, 23, 42, 0.45);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .hidden-admin.show { display: flex; }

    .hidden-admin-card {
      width: min(720px, 96vw);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
      padding: 18px;
    }

    .hidden-admin-card h2 {
      margin-bottom: 8px;
    }

    @media (max-width: 1050px) {
      main { grid-template-columns: 1fr; }
      .settings-grid { grid-template-columns: 1fr; }
    }

    @media print {
      body { background: #fff; }
      header, .left-column, .toolbar, .settings-section, .result-controls, .message, .legend, .no-print, .teacher-panel-trigger, .hidden-admin { display: none !important; }
      main { display: block; padding: 0; max-width: none; }
      section { border: none; box-shadow: none; padding: 0; }
      .seat-grid { min-width: 0; width: 100%; gap: 7px; }
      .seat { min-height: 70px; break-inside: avoid; }
      .blackboard { margin-top: 0; }
    }
  </style>
</head>
<body>
  <header>
    <h1>席替えアプリ</h1>
    <p>複数クラス対応・指定席・前方希望・履歴保存</p>
  </header>

  <main>
    <div class="left-column">
      <section>
        <h2>1. クラス選択</h2>
        <div class="row">
          <select id="classSelect" class="grow"></select>
          <button id="createClassBtn">新規</button>
        </div>
        <div class="row">
          <input id="classNameInput" type="text" placeholder="クラス名" class="grow" />
          <button id="renameClassBtn" class="secondary">変更</button>
          <button id="deleteClassBtn" class="danger">削除</button>
        </div>
        <p class="help">データはこのブラウザのローカルストレージに保存されます。</p>
      </section>

      <section>
        <h2>2. 生徒管理</h2>
        <div class="row">
          <input id="studentNameInput" type="text" placeholder="生徒名を入力" class="grow" />
          <button id="addStudentBtn">追加</button>
        </div>
        <label for="bulkNamesInput">一括貼り付け（改行区切り）</label>
        <textarea id="bulkNamesInput" placeholder="山田 花子&#10;佐藤 美咲&#10;田中 葵"></textarea>
        <div class="row">
          <button id="bulkAddBtn" class="success">一括追加</button>
          <button id="clearStudentsBtn" class="danger">生徒を全削除</button>
        </div>
        <h3>生徒一覧</h3>
        <div id="studentList" class="student-list"></div>
      </section>

      <section class="settings-section">
        <h2>4. 詳細設定</h2>
        <div class="settings-grid">
          <label class="check-label"><input id="preferFrontCheck" type="checkbox" checked /> 前方希望者を優先する</label>
          <label class="check-label"><input id="avoidPreviousCheck" type="checkbox" checked /> 前回と同じ席を避ける</label>
        </div>
        <div class="toolbar">
          <button id="reshuffleBtn" class="warning">再シャッフル</button>
          <button id="validateBtn" class="secondary">設定チェック</button>
        </div>
      </section>
    </div>

    <div class="right-column">
      <section>
        <h2>3. 座席設定・座席表</h2>
        <div id="message" class="message"></div>
        <div class="blackboard">黒板</div>
        <div class="toolbar no-print">
          <select id="seatMode">
            <option value="view">表示・席選択</option>
            <option value="unused">使用しない机を切り替え</option>
            <option value="fixed">指定席を設定</option>
          </select>
          <select id="fixedStudentSelect"></select>
          <button id="setFixedBtn">選択席に指定</button>
          <button id="clearFixedBtn" class="secondary">選択席の指定解除</button>
          <button id="clearAllFixedBtn" class="secondary">全指定席解除</button>
        </div>
        <div class="seat-wrapper">
          <div id="seatGrid" class="seat-grid"></div>
        </div>
        <div class="legend no-print">
          <span><i style="background:#fff"></i>通常席</span>
          <span><i style="background:#dbeafe"></i>前方中央エリア</span>
          <span><i style="background:#fde68a"></i>指定席</span>
          <span><i style="background:#4b5563"></i>使用しない机</span>
          <span><i style="background:#f9fafb"></i>空席</span>
        </div>
        <div id="stats" class="stat-line no-print"></div>
      </section>

      <section>
        <h2>5. 席替え結果</h2>
        <div class="toolbar result-controls">
          <button id="shuffleBtn" class="success">席替え実行</button>
          <button id="saveResultBtn">結果を保存</button>
          <button id="printBtn" class="secondary">印刷</button>
          <button id="copyTextBtn" class="secondary">テキストをコピー</button>
          <button id="saveImageBtn" class="secondary">画像として保存</button>
        </div>
        <label for="copyText">コピー用テキスト</label>
        <textarea id="copyText" class="copy-text" readonly></textarea>
        <h3>過去の席替え結果</h3>
        <div id="historyList" class="history-list"></div>
      </section>
    </div>
  </main>


  <button id="teacherPanelBtn" class="teacher-panel-trigger no-print" title="管理" aria-label="管理者用設定を開く"></button>

  <div id="teacherPanel" class="hidden-admin no-print" aria-hidden="true">
    <div class="hidden-admin-card">
      <div class="row">
        <h2 class="grow">管理者用の隠し設定</h2>
        <button id="closeTeacherPanelBtn" class="secondary">閉じる</button>
      </div>
      <p class="help">画面投影中に見せたくない調整項目です。右下の小さな非表示ボタン、または Ctrl + Alt + K で開けます。</p>
      <h3>生徒同士の距離制限</h3>
      <p class="help">登録した2人が、前後左右・斜めの周囲8マスに並ばないようにします。</p>
      <div class="row">
        <select id="pairA" class="grow"></select>
        <select id="pairB" class="grow"></select>
        <button id="addPairBtn">追加</button>
      </div>
      <div id="pairList" class="pair-list"></div>
    </div>
  </div>

  <script>
    /************************************************************
     * 席替えアプリ
     * - 6行×8列 = 48席
     * - ローカルストレージ保存
     * - 複数クラス、生徒管理、使用しない机、指定席、前方希望、管理者用距離制限、履歴保存
     ************************************************************/

    const STORAGE_KEY = "seatShuffleApp.v1";
    const ROWS = 6;
    const COLS = 8;
    const MAX_RETRY = 1000;

    const $ = (id) => document.getElementById(id);

    let appData = loadData();
    let currentClassId = appData.currentClassId || appData.classes[0]?.id;
    let selectedSeatKey = null;
    let currentArrangement = null;

    const elements = {
      classSelect: $("classSelect"),
      classNameInput: $("classNameInput"),
      createClassBtn: $("createClassBtn"),
      renameClassBtn: $("renameClassBtn"),
      deleteClassBtn: $("deleteClassBtn"),
      studentNameInput: $("studentNameInput"),
      addStudentBtn: $("addStudentBtn"),
      bulkNamesInput: $("bulkNamesInput"),
      bulkAddBtn: $("bulkAddBtn"),
      clearStudentsBtn: $("clearStudentsBtn"),
      studentList: $("studentList"),
      seatGrid: $("seatGrid"),
      seatMode: $("seatMode"),
      fixedStudentSelect: $("fixedStudentSelect"),
      setFixedBtn: $("setFixedBtn"),
      clearFixedBtn: $("clearFixedBtn"),
      clearAllFixedBtn: $("clearAllFixedBtn"),
      preferFrontCheck: $("preferFrontCheck"),
      avoidPreviousCheck: $("avoidPreviousCheck"),
      reshuffleBtn: $("reshuffleBtn"),
      validateBtn: $("validateBtn"),
      pairA: $("pairA"),
      pairB: $("pairB"),
      addPairBtn: $("addPairBtn"),
      pairList: $("pairList"),
      teacherPanelBtn: $("teacherPanelBtn"),
      teacherPanel: $("teacherPanel"),
      closeTeacherPanelBtn: $("closeTeacherPanelBtn"),
      shuffleBtn: $("shuffleBtn"),
      saveResultBtn: $("saveResultBtn"),
      printBtn: $("printBtn"),
      copyTextBtn: $("copyTextBtn"),
      saveImageBtn: $("saveImageBtn"),
      copyText: $("copyText"),
      historyList: $("historyList"),
      message: $("message"),
      stats: $("stats"),
    };

    init();

    function init() {
      bindEvents();
      ensureCurrentClass();
      renderAll();
      showMessage("初回用サンプルデータを入れています。クラスや生徒名は自由に編集できます。", "info");
    }

    function bindEvents() {
      elements.classSelect.addEventListener("change", () => {
        currentClassId = elements.classSelect.value;
        appData.currentClassId = currentClassId;
        selectedSeatKey = null;
        currentArrangement = getCurrentClass().lastArrangement || null;
        saveData();
        renderAll();
      });

      elements.createClassBtn.addEventListener("click", createClass);
      elements.renameClassBtn.addEventListener("click", renameClass);
      elements.deleteClassBtn.addEventListener("click", deleteClass);
      elements.addStudentBtn.addEventListener("click", addStudent);
      elements.studentNameInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") addStudent();
      });
      elements.bulkAddBtn.addEventListener("click", bulkAddStudents);
      elements.clearStudentsBtn.addEventListener("click", clearStudents);
      elements.setFixedBtn.addEventListener("click", setFixedSeat);
      elements.clearFixedBtn.addEventListener("click", clearSelectedFixedSeat);
      elements.clearAllFixedBtn.addEventListener("click", clearAllFixedSeats);
      elements.addPairBtn.addEventListener("click", addAvoidPair);
      elements.teacherPanelBtn.addEventListener("click", openTeacherPanel);
      elements.closeTeacherPanelBtn.addEventListener("click", closeTeacherPanel);
      elements.teacherPanel.addEventListener("click", (e) => {
        if (e.target === elements.teacherPanel) closeTeacherPanel();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeTeacherPanel();
        if (e.ctrlKey && e.altKey && e.key.toLowerCase() === "k") openTeacherPanel();
      });
      elements.shuffleBtn.addEventListener("click", () => runShuffle(false));
      elements.reshuffleBtn.addEventListener("click", () => runShuffle(true));
      elements.validateBtn.addEventListener("click", validateAndReport);
      elements.saveResultBtn.addEventListener("click", saveResultToHistory);
      elements.printBtn.addEventListener("click", () => window.print());
      elements.copyTextBtn.addEventListener("click", copySeatText);
      elements.saveImageBtn.addEventListener("click", saveSeatAsSVGImage);
    }

    /********************
     * データ関連
     ********************/

    function makeId(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
    }

    function seatKey(row, col) {
      return `${row}-${col}`;
    }

    function parseSeatKey(key) {
      const [row, col] = key.split("-").map(Number);
      return { row, col };
    }

    function getAllSeatKeys() {
      const keys = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) keys.push(seatKey(r, c));
      }
      return keys;
    }

    function isFrontArea(key) {
      const { row, col } = parseSeatKey(key);
      // 前から1〜3列目 = row 0〜2、左から3〜6列目 = col 2〜5
      return row >= 0 && row <= 2 && col >= 2 && col <= 5;
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {
        console.warn("保存データの読み込みに失敗しました", e);
      }
      return createSampleData();
    }

    function saveData() {
      appData.currentClassId = currentClassId;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    function createSampleData() {
      const classId = makeId("class");
      const sampleNames = [
        "山田 花子", "佐藤 美咲", "鈴木 葵", "田中 結衣", "高橋 凛", "伊藤 咲良",
        "渡辺 陽菜", "中村 美月", "小林 優奈", "加藤 心春", "吉田 彩乃", "山本 莉子",
        "松本 ひなた", "井上 七海", "木村 紗良", "林 愛莉", "清水 玲奈", "山崎 未来",
        "森 詩織", "池田 里奈", "橋本 真央", "阿部 菜月", "石川 優衣", "藤田 杏奈",
        "岡田 美羽", "長谷川 彩花", "村上 結菜", "近藤 梨花", "斎藤 明日香", "遠藤 舞"
      ];
      const students = sampleNames.map((name, index) => ({
        id: makeId("stu"),
        name,
        wantsFront: index % 7 === 0
      }));
      return {
        version: 1,
        currentClassId: classId,
        classes: [
          {
            id: classId,
            name: "サンプルクラス",
            students,
            unusedSeats: ["5-7", "5-6"],
            fixedSeats: {},
            avoidPairs: [],
            previousSeats: {},
            lastArrangement: null,
            history: []
          }
        ]
      };
    }

    function ensureCurrentClass() {
      if (!appData.classes || appData.classes.length === 0) {
        appData = createSampleData();
      }
      if (!appData.classes.some(c => c.id === currentClassId)) {

      }
      const cls = getCurrentClass();
      currentArrangement = cls.lastArrangement || null;
      saveData();
    }

    function renderSeatGrid() {
      const cls = getCurrentClass();
      const arrangement = currentArrangement || cls.lastArrangement || {};
      const fixedSeatKeys = Object.keys(cls.fixedSeats || {});

      elements.seatGrid.innerHTML = getAllSeatKeys().map(key => {
        const { row, col } = parseSeatKey(key);
        const isUnused = cls.unusedSeats.includes(key);
        const fixedStudentId = cls.fixedSeats[key];
        const studentId = arrangement[key] || fixedStudentId || null;
        const student = studentId ? getStudentById(studentId) : null;
        const classes = ["seat"];
        if (isFrontArea(key)) classes.push("front-area");
        if (isUnused) classes.push("unused");
        if (fixedStudentId) classes.push("fixed");
        if (!student && !isUnused) classes.push("empty");
        if (selectedSeatKey === key) classes.push("selected");
        if (isUnused && fixedStudentId) classes.push("conflict");

        let label = "";
        if (isUnused) label = `<span class="badge">使用不可</span>`;
        else if (fixedStudentId) label = `<span class="badge">指定席</span>`;
        else if (isFrontArea(key)) label = `<span class="badge">前方</span>`;

        let name = "空席";
        if (isUnused) name = "使用しない机";
        else if (student) name = student.name;

        return `
          <div class="${classes.join(" ")}" onclick="handleSeatClick('${key}')" title="${row + 1}行${col + 1}列">
            <span class="seat-number">${row + 1}-${col + 1}</span>

    /********************
     * 席替えアルゴリズム
     ********************/

    function runShuffle(isReshuffle) {
      const cls = getCurrentClass();
      const validation = validateSettings(cls);
      if (!validation.ok) {
        showMessage(validation.message, "error");
        return;
      }

      const result = generateBestArrangement(cls, {
        preferFront: elements.preferFrontCheck.checked,
        avoidPrevious: elements.avoidPreviousCheck.checked
      });

      if (!result.ok) {
        showMessage(result.message, "error");
        return;
      }

      currentArrangement = result.arrangement;
      cls.lastArrangement = result.arrangement;
      saveData();
      renderAll();
      showMessage(`${isReshuffle ? "再シャッフル" : "席替え"}が完了しました。同じ席の人数: ${result.sameSeatCount}人 / 試行: ${result.tries}回`, "success");
    }

    function validateSettings(cls) {
      const usableSeats = getUsableSeatKeys(cls);
      if (cls.students.length > usableSeats.length) {
        return { ok: false, message: `生徒数が使用可能な席数を超えています。生徒数: ${cls.students.length}名、使用可能席: ${usableSeats.length}席` };
      }

      const seenStudents = new Set();
      for (const [key, studentId] of Object.entries(cls.fixedSeats || {})) {
        if (cls.unusedSeats.includes(key)) {
          return { ok: false, message: "指定席が使用しない机に設定されています。指定席を解除するか、机を使用可能に戻してください。" };
        }
        if (!getStudentById(studentId)) {
          return { ok: false, message: "削除済みの生徒が指定席に残っています。指定席を解除してください。" };
        }
        if (seenStudents.has(studentId)) {
          return { ok: false, message: "同じ生徒が複数の指定席に設定されています。" };
        }
        seenStudents.add(studentId);
      }

      for (const pair of cls.avoidPairs || []) {
        if (!getStudentById(pair.a) || !getStudentById(pair.b)) {
          return { ok: false, message: "管理者用の条件に削除済みの生徒が含まれています。設定を確認してください。" };
        }
      }

      const fixedArrangement = {};
      Object.entries(cls.fixedSeats || {}).forEach(([key, studentId]) => fixedArrangement[key] = studentId);
      const fixedConflict = checkAvoidPairConflicts(fixedArrangement, cls.avoidPairs || []);
      if (fixedConflict.length > 0) {
        return { ok: false, message: `指定席の時点で管理者用条件と矛盾しています: ${fixedConflict.join("、")}` };
      }

      return { ok: true, message: "設定に大きな問題はありません。" };
    }

    function validateAndReport() {
      const result = validateSettings(getCurrentClass());
      showMessage(result.message, result.ok ? "success" : "error");
    }

    function getUsableSeatKeys(cls) {
      return getAllSeatKeys().filter(key => !cls.unusedSeats.includes(key));
    }

    function getFrontCandidateSeats(cls) {
      return getUsableSeatKeys(cls).filter(key => isFrontArea(key) && !cls.fixedSeats[key]);
    }

    function generateBestArrangement(cls, options) {
      let best = null;
      let bestSameCount = Infinity;
      let tries = 0;

      for (let i = 0; i < MAX_RETRY; i++) {
        tries++;
        const candidate = generateOneArrangement(cls, options);
        if (!candidate) continue;
        const conflicts = checkAvoidPairConflicts(candidate, cls.avoidPairs || []);
        if (conflicts.length > 0) continue;

        const sameCount = options.avoidPrevious ? countSameAsPrevious(candidate, cls.previousSeats || {}, cls.fixedSeats || {}) : 0;

        if (!options.avoidPrevious) {
          return { ok: true, arrangement: candidate, sameSeatCount: sameCount, tries };
        }

        if (sameCount < bestSameCount) {
          best = candidate;
          bestSameCount = sameCount;
        }

        // 0人なら最良なので即採用
        if (sameCount === 0) {
          return { ok: true, arrangement: candidate, sameSeatCount: sameCount, tries };
        }
      }

      if (best) {
        return { ok: true, arrangement: best, sameSeatCount: bestSameCount, tries };
      }

      return {
        ok: false,
        message: "条件を満たす配置が見つかりませんでした。指定席・使用しない机・管理者用条件を減らして再度お試しください。"
      };
    }

    function generateOneArrangement(cls, options) {
      const arrangement = {};
      const usableSeats = getUsableSeatKeys(cls);
      let availableSeats = usableSeats.slice();

      // 1. 指定席を先に配置
      const fixedStudentIds = new Set();
      for (const [key, studentId] of Object.entries(cls.fixedSeats || {})) {
        if (!availableSeats.includes(key)) return null;
        arrangement[key] = studentId;
        fixedStudentIds.add(studentId);
        availableSeats = availableSeats.filter(k => k !== key);
      }

      // 2. 生徒を分類
      const remainingStudents = cls.students.filter(s => !fixedStudentIds.has(s.id));
      let frontStudents = [];
      let normalStudents = [];
      if (options.preferFront) {
        frontStudents = shuffleArray(remainingStudents.filter(s => s.wantsFront));
        normalStudents = shuffleArray(remainingStudents.filter(s => !s.wantsFront));
      } else {
        normalStudents = shuffleArray(remainingStudents);
      }

      // 3. 前方希望者を前方中央エリアに優先配置
      const frontSeats = shuffleArray(availableSeats.filter(isFrontArea));
      for (const student of frontStudents) {
        if (frontSeats.length === 0) break;
        const key = frontSeats.pop();
        arrangement[key] = student.id;
        availableSeats = availableSeats.filter(k => k !== key);
      }

      const placedFrontIds = new Set(Object.values(arrangement));
      const notPlacedFrontStudents = frontStudents.filter(s => !placedFrontIds.has(s.id));

      // 4. 残りの生徒をランダム配置
      const restStudents = shuffleArray([...notPlacedFrontStudents, ...normalStudents]);
      const restSeats = shuffleArray(availableSeats);
      if (restStudents.length > restSeats.length) return null;
      for (const student of restStudents) {
        const key = restSeats.pop();
        arrangement[key] = student.id;
      }

      return arrangement;
    }

    function checkAvoidPairConflicts(arrangement, pairs) {
      const positionByStudent = {};
      Object.entries(arrangement).forEach(([key, studentId]) => {
        positionByStudent[studentId] = key;
      });

      const conflicts = [];
      for (const pair of pairs) {
        const keyA = positionByStudent[pair.a];
        const keyB = positionByStudent[pair.b];
        if (!keyA || !keyB) continue;
        if (areNear(keyA, keyB)) {
          const a = getStudentById(pair.a)?.name || "生徒A";
          const b = getStudentById(pair.b)?.name || "生徒B";
          conflicts.push(`${a}・${b}`);
        }
      }
      return conflicts;
    }

    function areNear(keyA, keyB) {
      const a = parseSeatKey(keyA);
      const b = parseSeatKey(keyB);
      const dr = Math.abs(a.row - b.row);
      const dc = Math.abs(a.col - b.col);
      return dr <= 1 && dc <= 1 && !(dr === 0 && dc === 0);
    }

    function countSameAsPrevious(arrangement, previousSeats, fixedSeats) {
      let count = 0;
      const fixedStudentIds = new Set(Object.values(fixedSeats));
      Object.entries(arrangement).forEach(([key, studentId]) => {
        if (fixedStudentIds.has(studentId)) return;
        if (previousSeats[studentId] === key) count++;
      });
      return count;
    }

    function shuffleArray(array) {
      const arr = array.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    /********************
     * 結果保存・履歴・出力
     ********************/

    function saveResultToHistory() {
      const cls = getCurrentClass();
      if (!currentArrangement || Object.keys(currentArrangement).length === 0) {
        return showMessage("保存する席替え結果がありません。先に席替えを実行してください。", "error");
      }

      const now = new Date();
      const date = formatDateTime(now);
      const title = prompt("保存名を入力してください", `${cls.name} 席替え`);
      if (title === null) return;

      cls.history.push({
        id: makeId("history"),
        date,
        title: title.trim() || "席替え結果",
        arrangement: structuredCloneSafe(currentArrangement)
      });

      // 次回の「前回の席」として保存する
      cls.previousSeats = arrangementToPreviousSeats(currentArrangement);
      cls.lastArrangement = currentArrangement;

      saveData();
      renderAll();
      showMessage("席替え結果を保存し、前回の席として登録しました。", "success");
    }

    function arrangementToPreviousSeats(arrangement) {
      const previous = {};
      Object.entries(arrangement).forEach(([key, studentId]) => {
        previous[studentId] = key;
      });
      return previous;
    }

      currentArrangement = structuredCloneSafe(item.arrangement);
      cls.lastArrangement = currentArrangement;

      renderAll();
      showMessage("履歴を削除しました。", "success");
    };

    function buildSeatText(arrangement) {
      const cls = getCurrentClass();
      const lines = [];
      lines.push(`【${cls.name} 座席表】`);
      lines.push("黒板");
      lines.push("");
      for (let r = 0; r < ROWS; r++) {
        const rowNames = [];
        for (let c = 0; c < COLS; c++) {
          const key = seatKey(r, c);
          if (cls.unusedSeats.includes(key)) {
            rowNames.push("[使用不可]");
          } else {
            const studentId = arrangement[key] || cls.fixedSeats[key];
            const name = studentId ? (getStudentById(studentId)?.name || "削除済み") : "空席";
            rowNames.push(name);
          }
        }
        lines.push(`${r + 1}列目: ${rowNames.join(" / ")}`);
      }
      return lines.join("\n");
    }

    async function copySeatText() {
      elements.copyText.select();
      try {
        await navigator.clipboard.writeText(elements.copyText.value);
        showMessage("座席表テキストをコピーしました。", "success");
      } catch (e) {
        document.execCommand("copy");
        showMessage("座席表テキストをコピーしました。", "success");
      }
    }

    // 外部ライブラリなしで簡易的にSVG画像として保存する機能
    function saveSeatAsSVGImage() {
      const cls = getCurrentClass();
      const arrangement = currentArrangement || cls.lastArrangement || {};
      const cellW = 140;
      const cellH = 82;
      const gap = 10;
      const margin = 30;
      const boardH = 48;
      const width = margin * 2 + COLS * cellW + (COLS - 1) * gap;
      const height = margin * 2 + boardH + 24 + ROWS * cellH + (ROWS - 1) * gap;

      const esc = escapeXml;
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;
      svg += `<rect width="100%" height="100%" fill="#ffffff"/>`;
      svg += `<rect x="${margin}" y="${margin}" width="${width - margin * 2}" height="${boardH}" rx="8" fill="#14532d" stroke="#7c4a20" stroke-width="5"/>`;
      svg += `<text x="${width / 2}" y="${margin + 31}" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">黒板</text>`;
      svg += `<text x="${margin}" y="${margin - 8}" font-size="18" font-weight="700" fill="#111827">${esc(cls.name)} 座席表</text>`;

      const startY = margin + boardH + 24;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const key = seatKey(r, c);
          const x = margin + c * (cellW + gap);
          const y = startY + r * (cellH + gap);
          const isUnused = cls.unusedSeats.includes(key);
          const isFixed = Boolean(cls.fixedSeats[key]);
          const front = isFrontArea(key);
          let fill = "#ffffff";
          let stroke = "#d1d5db";
          let textColor = "#111827";
          if (front) fill = "#dbeafe";
          if (isFixed) { fill = "#fde68a"; stroke = "#f59e0b"; }
          if (isUnused) { fill = "#4b5563"; stroke = "#374151"; textColor = "#ffffff"; }

          let name = "空席";
          if (isUnused) name = "使用しない机";
          else {
            const studentId = arrangement[key] || cls.fixedSeats[key];
            if (studentId) name = getStudentById(studentId)?.name || "削除済み";
          }
          svg += `<rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" rx="10" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
          svg += `<text x="${x + 8}" y="${y + 17}" font-size="12" fill="${isUnused ? '#e5e7eb' : '#6b7280'}">${r + 1}-${c + 1}</text>`;
          svg += `<text x="${x + cellW / 2}" y="${y + 49}" text-anchor="middle" font-size="16" font-weight="700" fill="${textColor}">${esc(name)}</text>`;
        }
      }
      svg += `</svg>`;

      const blob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${cls.name}_座席表.svg`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showMessage("SVG画像として保存しました。", "success");
    }

    /********************
     * 汎用関数
     ********************/

    function showMessage(text, type = "info") {
      elements.message.textContent = text;
      elements.message.className = `message show ${type}`;
      clearTimeout(showMessage.timer);
      showMessage.timer = setTimeout(() => {
        elements.message.classList.remove("show");
      }, 7000);
    }

    function formatDateTime(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      return `${y}/${m}/${d} ${hh}:${mm}`;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeXml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&apos;");
    }

    function structuredCloneSafe(obj) {
      if (typeof structuredClone === "function") return structuredClone(obj);
      return JSON.parse(JSON.stringify(obj));
    }
  </script>
